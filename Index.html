<html lang="es">
<head>
	<meta charset="UTF-8"/>
	<title>Segundo ejercicio</title>
	
	<!--Agregar título y subtitulo a mi visor -->
	<h1 style= "text-align:center; color:#8835B5">Mapa de Luminaria en Ecuador</h1>
	<h2 style= "text-align:center;color:#35ACB5">Estudiante: Cinthya Baque Ganan</h2>
	
	<!--API de Leaflet -->
	 <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>
	 
	  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
     crossorigin=""></script>
	
	<!-- MarkerCluster -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.4.1/MarkerCluster.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.4.1/MarkerCluster.Default.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.4.1/leaflet.markercluster.js"></script>
	
	
</head>

<body>
	<div id="mapa" style= "width:100%; height:450px"></div>
	
	<script>
	
	var osm = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
		attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
		});
		
	
	var ggl= L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
		attribution: '&copy; <a href="http://www.idesa.gob.ar/2021/03/25/mas-mapas-xyz-tiles/">Google Hybrid</a>'
	});
	
	
	var gglmps= L.tileLayer('https://mt1.google.com/vt/lyrs=r&x={x}&y={y}&z={z}', {
		attribution: '&copy; <a href="http://www.idesa.gob.ar/2021/03/25/mas-mapas-xyz-tiles/">Google Maps</a>'
	});
	
	
	var map = L.map('mapa',{
		center:[-1.387672,-78.669355],
		zoom: 10,
		layers:osm});
	
	var icono1= L.icon({
		iconUrl: 'https://cdn-icons-png.flaticon.com/512/1464/1464848.png',
		iconSize:     [40, 55], 
		iconAnchor:   [22, 60],   
		popupAnchor:  [-3, -76] 
		});
	
	//Crear el Grupo Cluster
	var agrupacion = L.markerClusterGroup({
	chunkedLoading:true})
	
	//Agregar una conexión a GitHub de los datos del GeoJSON
	fetch("https://raw.githubusercontent.com/cinthyabaque/BigData/main/LuminariasCWGCS.geojson")
	.then((response)=> response.json())
	.then((datos)=>{ var capa = L.geoJson(datos, {onEachFeature: function(Feature, capa){
	capa.bindPopup(
            
            "<b style='color: #E74C3C;'>Alimentador: </b>" + Feature.properties["ALIMENTADO"] + "<br>" +
            "<b style='color: #2E86C1;'>Código de Empresa: </b>" + Feature.properties["CODIGOEMPR"] + "<br>" +
            "<b style='color: #27AE60;'>Código de Parroquia: </b>" + Feature.properties["PARROQUIA"] + "<br>" +
            "<b style='color: #F39C12;'>Código de Provincia: </b>" + Feature.properties["PROVINCIA"] + "<br>" +
            "<b style='color: #8E44AD;'>Código de Elementos: </b>" + Feature.properties["CODIGOELEM"] + "<br>" +
            "<b style='color: #16A085;'>Alimentador Uno: </b>" + Feature.properties["ALIMENTA_1"] + "<br>" +
            "<b style='color: #D35400;'>Código de Cantón: </b>" + Feature.properties["CANTON"])
        
			capa.on ("mouseover", function() {this.openPopup();})
			capa.on ("mouseout", function() {this.closePopup();})
		
    
  
	}});
	
	agrupacion.addLayer(capa);
	map.addLayer(agrupacion);})
	
	var mapbase= {
	"Open street map":osm,
	"Google Hybrid":ggl,
	"Google Maps":gglmps};
	
	L.control.layers(mapbase).addTo(map)
	
	
	
	</script>


	</body>

</html>
